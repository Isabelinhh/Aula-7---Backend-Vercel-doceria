<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha - Doceria</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-50 min-h-screen">

  <!-- HEADER -->
  <header class="bg-pink-500 text-white p-4 text-center text-xl font-bold">
    🍰 Cozinha - Pedidos
  </header>

  <!-- CONTAINER -->
  <main class="p-4 grid gap-4 md:grid-cols-2 lg:grid-cols-3">

    <!-- CARD PEDIDO -->
    <div class="bg-white rounded-xl shadow p-4 border-l-8 border-red-400" id="pedido1">
      <h2 class="text-lg font-bold">Pedido #001</h2>
      <p class="text-gray-600">Cliente: Maria</p>

      <ul class="my-2 text-sm">
        <li>🍩 2x Donuts</li>
        <li>🧁 1x Cupcake</li>
      </ul>

      <span class="status bg-red-100 text-red-600 px-2 py-1 rounded text-xs">
        Novo
      </span>

      <div class="mt-3 flex gap-2">
        <button onclick="mudarStatus(this, 'preparando')" 
          class="bg-yellow-400 text-white px-2 py-1 rounded text-sm">
          Preparar
        </button>

        <button onclick="mudarStatus(this, 'pronto')" 
          class="bg-green-500 text-white px-2 py-1 rounded text-sm">
          Finalizar
        </button>
      </div>
    </div>

    <!-- OUTRO PEDIDO -->
    <div class="bg-white rounded-xl shadow p-4 border-l-8 border-yellow-400">
      <h2 class="text-lg font-bold">Pedido #002</h2>
      <p class="text-gray-600">Cliente: João</p>

      <ul class="my-2 text-sm">
        <li>🎂 Bolo de chocolate</li>
      </ul>

      <span class="status bg-yellow-100 text-yellow-600 px-2 py-1 rounded text-xs">
        Preparando
      </span>

      <div class="mt-3 flex gap-2">
        <button onclick="mudarStatus(this, 'pronto')" 
          class="bg-green-500 text-white px-2 py-1 rounded text-sm">
          Finalizar
        </button>
      </div>
    </div>

  </main>

  <!-- SCRIPT -->
  <script>
    function mudarStatus(botao, status) {
      const card = botao.closest("div");
      const statusSpan = card.querySelector(".status");

      if (status === "preparando") {
        statusSpan.textContent = "Preparando";
        statusSpan.className = "status bg-yellow-100 text-yellow-600 px-2 py-1 rounded text-xs";
        card.classList.remove("border-red-400");
        card.classList.add("border-yellow-400");
      }

      if (status === "pronto") {
        statusSpan.textContent = "Pronto";
        statusSpan.className = "status bg-green-100 text-green-600 px-2 py-1 rounded text-xs";
        card.classList.remove("border-yellow-400");
        card.classList.add("border-green-400");
      }
    }
  </script>

</body>
</html>
